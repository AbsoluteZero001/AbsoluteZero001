name: Update WakaTime Stats

on:
  schedule:
    # 每天 UTC 00:00 执行（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wakatime:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Update WakaTime All Time Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: "AbsoluteZero001/AbsoluteZero001"
          SHOW_TITLE: true
          SHOW_TIME: true
          SHOW_TOTAL: true
          TIME_RANGE: "all_time"
          LANG_COUNT: 0
          SECTION_NAME: "WakaTotal"
          COMMIT_MESSAGE: "chore: update WakaTime all-time stats"

      - name: Update WakaTime Last 30 Days Language Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: "AbsoluteZero001/AbsoluteZero001"
          SHOW_TITLE: true
          SHOW_TIME: true
          SHOW_TOTAL: false
          TIME_RANGE: "last_30_days"
          LANG_COUNT: 10
          SECTION_NAME: "WakaLast30Days"
          COMMIT_MESSAGE: "chore: update WakaTime 30-day stats"
