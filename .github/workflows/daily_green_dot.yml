name: Daily GitHub Green Dot

# 强制使用 Node.js 24 运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 每天北京时间 08:00 触发
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Update README daily section
        run: |
          DATE=$(date '+%Y-%m-%d')
          # 替换注释区内容
          if grep -q "<!--START_SECTION:DAILY-->" README.md; then
            sed -i "/<!--START_SECTION:DAILY-->.*<!--END_SECTION:DAILY-->/c\<!--START_SECTION:DAILY-->\nLearning Snapshot: $DATE\n<!--END_SECTION:DAILY-->" README.md
          else
            # 如果没有找到注释区，追加到文件末尾
            echo -e "\n<!--START_SECTION:DAILY-->\nLearning Snapshot: $DATE\n<!--END_SECTION:DAILY-->" >> README.md
          fi

      - name: Configure Git
        run: |
          git config user.name "AbsoluteZero"
          git config user.email "186853152+AbsoluteZero001@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add README.md
          git commit -m "Daily progress update: $DATE" || echo "No changes to commit"
          git push
